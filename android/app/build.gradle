apply plugin: 'com.android.application'

def ciqSecret = { String name ->
    def value = project.findProperty(name)
    if (value == null || value.toString().trim().isEmpty()) {
        value = System.getenv(name)
    }
    return value == null ? null : value.toString().trim()
}

def ciqReleaseStorePassword = ciqSecret("CIQ_RELEASE_STORE_PASSWORD")
def ciqReleaseKeyPassword = ciqSecret("CIQ_RELEASE_KEY_PASSWORD")
def ciqReleaseKeyAlias = ciqSecret("CIQ_RELEASE_KEY_ALIAS") ?: "collisioniq"

// Keystore lives at android/collisioniq-release.keystore.
// app/build.gradle is inside android/app, so use rootProject.file(...)
def ciqReleaseStoreFile = rootProject.file("collisioniq-release.keystore")

def ciqHasReleaseSigning =
        ciqReleaseStoreFile.exists() &&
        ciqReleaseStorePassword &&
        ciqReleaseKeyPassword

android {
    namespace "com.collisionacademy.collisioniq"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.collisionacademy.collisioniq"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 11
        versionName "1.0.11"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile ciqReleaseStoreFile
            keyAlias ciqReleaseKeyAlias

            if (ciqReleaseStorePassword) {
                storePassword ciqReleaseStorePassword
            }

            if (ciqReleaseKeyPassword) {
                keyPassword ciqReleaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (ciqHasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def releaseBuildRequested = graph.allTasks.any { task ->
        def name = task.name.toLowerCase()
        def path = task.path.toLowerCase()

        path.startsWith(":app:") &&
                name.contains("release") &&
                (
                        name.contains("assemble") ||
                        name.contains("bundle") ||
                        name.contains("package") ||
                        name.contains("sign")
                )
    }

    if (releaseBuildRequested && !ciqHasReleaseSigning) {
        def missing = []

        if (!ciqReleaseStoreFile.exists()) {
            missing << "android/collisioniq-release.keystore"
        }

        if (!ciqReleaseStorePassword) {
            missing << "CIQ_RELEASE_STORE_PASSWORD"
        }

        if (!ciqReleaseKeyPassword) {
            missing << "CIQ_RELEASE_KEY_PASSWORD"
        }

        throw new GradleException(
                "Missing release signing credentials. Set ${missing.join(', ')} in local Gradle properties or environment variables."
        )
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
